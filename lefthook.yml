pre-commit:
  parallel: false
  commands:
    format:
      root: frontend
      run: pnpm format
      stage_fixed: true
    lint:
      root: frontend
      run: pnpm lint
    typecheck:
      root: frontend
      run: pnpm typecheck

pre-push:
  parallel: false
  commands:
    test:
      root: frontend
      run: pnpm test
    build:
      root: frontend
      run: pnpm build
